<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | BLUSH & BLOOM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-container">
      <a href="/index.html" class="logo">BLUSH<span>&</span>BLOOM</a>
      <nav>
        <ul class="nav-links">
          <li><a href="/index.html" class="nav-link">Home</a></li>
          <li><a href="/shop.html" class="nav-link">Shop All</a></li>
          <li><a href="/shop.html?category=Ethnic,Ethnic%20Casual" class="nav-link">Heritage</a></li>
        </ul>
      </nav>
      <div class="nav-actions" id="nav-auth-actions">
        <a href="/login.html" class="nav-btn"><i class="far fa-user"></i></a>
        <a href="/login.html" class="nav-btn"><i class="fas fa-shopping-bag"></i></a>
      </div>
    </div>
  </header>

  <!-- Cart Page Layout -->
  <main class="container section" style="margin-top: 60px;">
    <h1 class="serif-title" style="font-size: 2.5rem; margin-bottom: 2rem;">Your Shopping Bag</h1>
    
    <div class="cart-page-layout" id="cart-content-wrapper">
      <!-- Loading message -->
      <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 5rem;">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; margin-bottom: 1rem;"></i>
        <p>Retrieving your bag...</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0; display: flex; justify-content: space-between;">
        <p>&copy; 2026 BLUSH & BLOOM. All rights reserved.</p>
        <p>Premium Sustainable Fashion</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let cartData = null;
    let appliedCoupon = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!window.Auth.isLoggedIn()) {
        window.location.href = '/login.html';
        return;
      }
      // Load applied coupon from session storage if it exists
      const savedCoupon = sessionStorage.getItem('bloom_coupon');
      if (savedCoupon) {
        appliedCoupon = JSON.parse(savedCoupon);
      }

      await loadCart();
    });

    async function loadCart() {
      try {
        const response = await window.API.get('/cart');
        if (response.success && response.data) {
          cartData = response.data;
          renderCart();
        }
      } catch (err) {
        document.getElementById('cart-content-wrapper').innerHTML = `
          <p style="grid-column: 1/-1; text-align: center; color: var(--error);">Failed to load cart. Please reload.</p>
        `;
      }
    }

    function renderCart() {
      const wrapper = document.getElementById('cart-content-wrapper');
      const items = cartData.items || [];

      if (items.length === 0) {
        wrapper.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 6rem 2rem; background-color: var(--bg-secondary); border: 1px solid var(--border-color);">
            <i class="fas fa-shopping-bag" style="font-size: 4rem; color: var(--border-color); margin-bottom: 1.5rem;"></i>
            <h2 class="serif-title" style="font-size: 1.8rem; margin-bottom: 0.5rem;">Your Bag is Empty</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">You haven't added any products to your cart yet.</p>
            <a href="/shop.html" class="btn btn-primary">Start Shopping</a>
          </div>
        `;
        return;
      }

      // Calculations
      let subtotal = 0;
      const itemsHTML = items.map(item => {
        const prod = item.product;
        if (!prod) return ''; // handles safety check if product deleted

        const itemSubtotal = prod.price * item.quantity;
        subtotal += itemSubtotal;

        return `
          <div class="cart-item-row animate-fade-in-up">
            <img src="${prod.images[0]}" alt="${prod.name}" class="cart-item-img">
            <div class="cart-item-details">
              <h3 class="cart-item-name" style="cursor: pointer;" onclick="window.location.href='/product.html?id=${prod._id}'">${prod.name}</h3>
              <div class="cart-item-meta">
                <span>Brand: ${prod.brand}</span> | 
                <span>Size: <strong style="color: var(--text-dark);">${item.size}</strong></span>
              </div>
              <div class="cart-item-qty">
                <button class="cart-qty-btn" onclick="updateQty('${item._id}', ${item.quantity - 1})">-</button>
                <input type="text" class="cart-qty-input" value="${item.quantity}" readonly>
                <button class="cart-qty-btn" onclick="updateQty('${item._id}', ${item.quantity + 1})">+</button>
              </div>
            </div>
            <div class="cart-item-price-box">
              <span class="cart-item-price">₹${itemSubtotal}</span>
              <span class="cart-item-remove-btn" onclick="removeCartItem('${item._id}')">Remove</span>
            </div>
          </div>
        `;
      }).join('');

      // Coupon Calculation
      let couponDiscount = 0;
      if (appliedCoupon) {
        // Validate minimum subtotal rule
        if (subtotal < appliedCoupon.minOrder) {
          appliedCoupon = null;
          sessionStorage.removeItem('bloom_coupon');
          window.API.showToast(`Coupon removed as subtotal is below ₹${appliedCoupon.minOrder}`, 'error');
        } else {
          if (appliedCoupon.type === 'percentage') {
            couponDiscount = Math.round(subtotal * (appliedCoupon.discount / 100));
          } else {
            couponDiscount = appliedCoupon.discount;
          }
        }
      }

      const deliveryCharge = subtotal > 1000 ? 0 : 99;
      const totalAmount = subtotal - couponDiscount + deliveryCharge;

      // Save summary figures for checkout
      const summaryData = {
        subtotal,
        discount: couponDiscount,
        deliveryCharge,
        totalAmount,
        couponCode: appliedCoupon ? appliedCoupon.code : null
      };
      localStorage.setItem('bloom_order_summary', JSON.stringify(summaryData));

      wrapper.innerHTML = `
        <!-- Left: Cart Items -->
        <div class="cart-table-container">
          ${itemsHTML}
        </div>

        <!-- Right: Order Summary -->
        <div class="order-summary-card">
          <h2 class="summary-title">Order Summary</h2>
          
          <div class="summary-row">
            <span>Bag Subtotal</span>
            <span>₹${subtotal}</span>
          </div>

          ${appliedCoupon ? `
            <div class="summary-row" style="color: var(--success); font-weight: 600;">
              <span>Promo Discount (${appliedCoupon.code})</span>
              <span>-₹${couponDiscount}</span>
            </div>
          ` : ''}

          <div class="summary-row">
            <span>Delivery Charges</span>
            <span>${deliveryCharge === 0 ? '<strong style="color: var(--success);">FREE</strong>' : `₹${deliveryCharge}`}</span>
          </div>

          <!-- Coupon Input Form -->
          <div class="coupon-section">
            <label style="font-size: 0.85rem; font-weight: 600; text-transform: uppercase; color: var(--text-dark);">Apply Promo Code</label>
            ${appliedCoupon ? `
              <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; background-color: var(--accent-rose-light); padding: 0.75rem 1rem; border: 1px solid var(--accent-blush);">
                <span style="font-weight: 600; font-size: 0.85rem; color: var(--accent-burgundy);"><i class="fas fa-tag"></i> ${appliedCoupon.code} Applied</span>
                <button onclick="removeCoupon()" style="color: var(--error); font-weight: 700; font-size: 0.85rem;">Remove</button>
              </div>
            ` : `
              <form class="coupon-form" id="coupon-form">
                <input type="text" class="coupon-input" id="coupon-code-input" required placeholder="e.g. BLOOM20">
                <button type="submit" class="btn btn-primary" style="padding: 0.5rem 1.5rem; font-size: 0.8rem;">Apply</button>
              </form>
            `}
          </div>

          <div class="summary-row total">
            <span>Estimated Total</span>
            <span>₹${totalAmount}</span>
          </div>

          <button class="btn btn-accent" onclick="window.location.href='/checkout.html'" style="width: 100%; margin-top: 2rem; padding: 1.1rem;">
            Proceed To Checkout
          </button>
        </div>
      `;

      // Bind Coupon Form Submit
      const couponForm = document.getElementById('coupon-form');
      if (couponForm) {
        couponForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const codeInput = document.getElementById('coupon-code-input').value.trim().toUpperCase();
          
          try {
            const response = await window.API.post('/coupons/validate', {
              code: codeInput,
              orderAmount: subtotal
            });

            if (response.success && response.data) {
              appliedCoupon = response.data;
              sessionStorage.setItem('bloom_coupon', JSON.stringify(appliedCoupon));
              window.API.showToast(response.message || 'Coupon applied successfully!');
              renderCart();
            }
          } catch (err) {
            // Error toasts automatically handled
          }
        });
      }
    }

    window.updateQty = async function(itemId, newQty) {
      if (newQty < 1) return;
      try {
        const response = await window.API.put(`/cart/${itemId}`, { quantity: newQty });
        if (response.success && response.data) {
          cartData = response.data;
          renderCart();
          window.Auth.updateCartBadgeCount();
        }
      } catch (err) {
        console.error('Failed to update quantity:', err);
      }
    };

    window.removeCartItem = async function(itemId) {
      try {
        const response = await window.API.delete(`/cart/${itemId}`);
        if (response.success && response.data) {
          cartData = response.data;
          renderCart();
          window.API.showToast('Item removed from shopping bag.');
          window.Auth.updateCartBadgeCount();
        }
      } catch (err) {
        console.error('Failed to remove item:', err);
      }
    };

    window.removeCoupon = function() {
      appliedCoupon = null;
      sessionStorage.removeItem('bloom_coupon');
      window.API.showToast('Coupon code removed.');
      renderCart();
    };
  </script>
</body>
</html>
