<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | BLUSH & BLOOM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-container">
      <a href="/index.html" class="logo">BLUSH<span>&</span>BLOOM</a>
      <nav>
        <ul class="nav-links">
          <li><a href="/index.html" class="nav-link">Home</a></li>
          <li><a href="/shop.html" class="nav-link">Shop All</a></li>
        </ul>
      </nav>
      <div class="nav-actions" id="nav-auth-actions">
        <a href="/login.html" class="nav-btn"><i class="far fa-user"></i></a>
      </div>
    </div>
  </header>

  <!-- Register Form Box -->
  <main class="auth-page-container" style="max-width: 600px; margin-top: 110px;">
    <div class="auth-header">
      <h1 class="auth-title">Join the Bloom Club</h1>
      <p class="auth-subtitle">Create an account to personalize your styling experience.</p>
    </div>
    
    <form id="register-form">
      <div class="form-grid">
        <div class="form-group full-width">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="Enter email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Minimum 6 characters" minlength="6">
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" required placeholder="10-digit number" pattern="[0-9]{10}">
        </div>
        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" required>
        </div>
        <div class="form-group full-width">
          <label for="gender">Gender Profile</label>
          <select id="gender" required>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem; padding: 1rem;">Create Account</button>
    </form>
    
    <div class="auth-footer">
      <p>Already have an account? <a href="/login.html">Sign In</a></p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (window.Auth.isLoggedIn()) {
        window.location.href = '/profile.html';
        return;
      }

      const form = document.getElementById('register-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const dob = document.getElementById('dob').value;
        const gender = document.getElementById('gender').value;

        // DOB Validation: Must not be in the future
        if (new Date(dob) > new Date()) {
          window.API.showToast('Date of Birth cannot be in the future', 'error');
          return;
        }

        await window.Auth.register(name, email, password, phone, dob, gender);
      });
    });
  </script>
</body>
</html>
