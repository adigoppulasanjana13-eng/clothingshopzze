<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | BLUSH & BLOOM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .profile-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 3rem;
      margin-top: 40px;
      align-items: start;
    }
    .profile-tabs-sidebar {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      padding: 1.5rem;
    }
    .profile-tab-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      text-align: left;
      transition: all var(--transition-fast);
    }
    .profile-tab-btn:last-child {
      border-bottom: none;
    }
    .profile-tab-btn.active, .profile-tab-btn:hover {
      color: var(--accent-burgundy);
      background-color: var(--bg-primary);
    }
    .profile-tab-content-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      padding: 2.5rem;
      min-height: 450px;
    }
    .profile-title {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 2rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border-color);
    }
    .profile-info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem 1.5rem;
    }
    .profile-info-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .profile-info-item label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .profile-info-item span {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-dark);
    }
    .order-card {
      border: 1px solid var(--border-color);
      margin-bottom: 1.5rem;
      background-color: var(--bg-primary);
    }
    .order-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      background-color: rgba(0, 0, 0, 0.02);
    }
    .order-header strong {
      color: var(--text-dark);
    }
    .order-body {
      padding: 1.25rem;
    }
    .order-status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--white);
    }
    .order-status-badge.placed { background-color: var(--accent-blush); }
    .order-status-badge.shipped { background-color: #2b6cb0; }
    .order-status-badge.delivered { background-color: var(--success); }
    .order-status-badge.cancelled { background-color: var(--error); }
    
    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }
    .wishlist-card {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      padding: 1rem;
      text-align: center;
      position: relative;
    }
    .wishlist-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      margin-bottom: 0.75rem;
      cursor: pointer;
    }
    .wishlist-card .name {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wishlist-card .price {
      font-weight: 700;
      color: var(--accent-burgundy);
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    .wishlist-remove-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background-color: rgba(255, 255, 255, 0.9);
      color: var(--error);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }
    .wishlist-remove-btn:hover {
      background-color: var(--error);
      color: var(--white);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-container">
      <a href="/index.html" class="logo">BLUSH<span>&</span>BLOOM</a>
      <nav>
        <ul class="nav-links">
          <li><a href="/index.html" class="nav-link">Home</a></li>
          <li><a href="/shop.html" class="nav-link">Shop All</a></li>
          <li><a href="/shop.html?category=Ethnic,Ethnic%20Casual" class="nav-link">Heritage</a></li>
        </ul>
      </nav>
      <div class="nav-actions" id="nav-auth-actions">
        <!-- Loaded via auth.js -->
      </div>
    </div>
  </header>

  <!-- Profile Layout -->
  <main class="container section" style="margin-top: 60px;">
    <div class="profile-layout">
      
      <!-- Sidebar Tabs -->
      <aside class="profile-tabs-sidebar">
        <button class="profile-tab-btn active" onclick="switchTab('account', this)">
          <i class="far fa-user-circle"></i> Personal Profile
        </button>
        <button class="profile-tab-btn" onclick="switchTab('orders', this)">
          <i class="fas fa-history"></i> My Orders
        </button>
        <button class="profile-tab-btn" onclick="switchTab('wishlist', this)">
          <i class="far fa-heart"></i> My Wishlist
        </button>
        <button class="profile-tab-btn" onclick="switchTab('addresses', this)">
          <i class="fas fa-map-marker-alt"></i> Address Book
        </button>
      </aside>

      <!-- Tab Content Area -->
      <section class="profile-tab-content-card" id="profile-tab-content">
        <!-- Loaded dynamically -->
      </section>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0; display: flex; justify-content: space-between;">
        <p>&copy; 2026 BLUSH & BLOOM. All rights reserved.</p>
        <p>Premium Sustainable Fashion</p>
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let userData = null;
    let orderHistory = [];
    let wishlistItems = [];
    let activeTab = 'account';

    document.addEventListener('DOMContentLoaded', async () => {
      if (!window.Auth.isLoggedIn()) {
        window.location.href = '/login.html';
        return;
      }
      
      // Load initially profile
      await loadProfileData();
      renderActiveTab();
    });

    async function loadProfileData() {
      userData = await window.Auth.fetchProfile();
    }

    async function loadOrders() {
      try {
        const response = await window.API.get('/orders/my');
        if (response.success && response.data) {
          orderHistory = response.data;
        }
      } catch (err) {
        console.error('Failed to fetch orders:', err);
      }
    }

    async function loadWishlist() {
      try {
        const response = await window.API.get('/wishlist');
        if (response.success && response.data) {
          wishlistItems = response.data;
        }
      } catch (err) {
        console.error('Failed to fetch wishlist:', err);
      }
    }

    window.switchTab = async function(tab, btnElement) {
      activeTab = tab;
      
      document.querySelectorAll('.profile-tab-btn').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');

      if (tab === 'orders') {
        await loadOrders();
      } else if (tab === 'wishlist') {
        await loadWishlist();
      } else if (tab === 'account' || tab === 'addresses') {
        await loadProfileData();
      }

      renderActiveTab();
    };

    function renderActiveTab() {
      const content = document.getElementById('profile-tab-content');
      
      if (activeTab === 'account') {
        const dobFormatted = userData.dateOfBirth ? new Date(userData.dateOfBirth).toLocaleDateString('en-IN', {
          year: 'numeric', month: 'long', day: 'numeric'
        }) : 'Not provided';
        
        content.innerHTML = `
          <h2 class="profile-title">Personal Profile</h2>
          <div class="profile-info-grid">
            <div class="profile-info-item">
              <label>Full Name</label>
              <span>${userData.name}</span>
            </div>
            <div class="profile-info-item">
              <label>Email Address</label>
              <span>${userData.email}</span>
            </div>
            <div class="profile-info-item">
              <label>Contact Number</label>
              <span>${userData.phone || 'Not provided'}</span>
            </div>
            <div class="profile-info-item">
              <label>Gender</label>
              <span>${userData.gender || 'Female'}</span>
            </div>
            <div class="profile-info-item">
              <label>Date of Birth</label>
              <span>${dobFormatted}</span>
            </div>
            <div class="profile-info-item">
              <label>Generational Age Group</label>
              <span>${userData.ageGroup || 'Calculating...'}</span>
            </div>
          </div>

          <div style="margin-top: 3rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
            <h3 class="serif-title" style="font-size: 1.25rem; margin-bottom: 1.5rem;">Update Account Info</h3>
            <form id="edit-profile-form" onsubmit="handleProfileUpdate(event)">
              <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                  <label for="updateName">Name</label>
                  <input type="text" id="updateName" value="${userData.name}" required>
                </div>
                <div class="form-group">
                  <label for="updatePhone">Phone</label>
                  <input type="text" id="updatePhone" value="${userData.phone || ''}">
                </div>
              </div>
              <button type="submit" class="btn btn-primary" style="margin-top: 1.5rem; padding: 0.75rem 2rem; font-size: 0.85rem;">Save Details</button>
            </form>
          </div>
        `;
      } 
      
      else if (activeTab === 'orders') {
        content.innerHTML = `
          <h2 class="profile-title">My Orders</h2>
          <div id="orders-list-box">
            ${orderHistory.length === 0 ? `
              <p style="color: var(--text-muted); text-align: center; padding: 3rem 0;">You haven't placed any orders yet.</p>
            ` : orderHistory.map(ord => {
              const orderDate = new Date(ord.createdAt).toLocaleDateString('en-IN', {
                year: 'numeric', month: 'long', day: 'numeric'
              });
              
              return `
                <div class="order-card">
                  <div class="order-header">
                    <div>
                      <span>Placed on: <strong>${orderDate}</strong></span> | 
                      <span>Order ID: <strong>${ord._id}</strong></span>
                    </div>
                    <span class="order-status-badge ${ord.orderStatus.toLowerCase()}">${ord.orderStatus}</span>
                  </div>
                  <div class="order-body">
                    <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem;">
                      ${ord.items.map(item => `
                        <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                          <span>${item.productName} (Size: ${item.size}) <strong style="color: var(--text-muted);">x${item.quantity}</strong></span>
                          <span>₹${item.price * item.quantity}</span>
                        </div>
                      `).join('')}
                    </div>
                    <div style="display: flex; justify-content: space-between; border-top: 1px solid var(--border-color); padding-top: 1rem; font-size: 0.9rem;">
                      <div>
                        <span>Status: <strong>${ord.paymentStatus}</strong> | Payment: <strong>${ord.paymentMethod}</strong></span>
                      </div>
                      <span style="font-weight: 700; color: var(--accent-burgundy); font-size: 1.05rem;">Total Paid: ₹${ord.totalAmount}</span>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      } 
      
      else if (activeTab === 'wishlist') {
        content.innerHTML = `
          <h2 class="profile-title">My Wishlist</h2>
          ${wishlistItems.length === 0 ? `
            <p style="color: var(--text-muted); text-align: center; padding: 3rem 0;">Your wishlist is empty.</p>
          ` : `
            <div class="wishlist-grid">
              ${wishlistItems.map(item => `
                <div class="wishlist-card">
                  <button class="wishlist-remove-btn" onclick="removeWishlistItem('${item._id}')"><i class="fas fa-trash-alt"></i></button>
                  <img src="${item.images[0]}" alt="${item.name}" onclick="window.location.href='/product.html?id=${item._id}'">
                  <div class="name">${item.name}</div>
                  <div class="price">₹${item.price}</div>
                  <button class="btn btn-primary" onclick="window.location.href='/product.html?id=${item._id}'" style="padding: 0.5rem 1rem; font-size: 0.75rem; width: 100%;">View Details</button>
                </div>
              `).join('')}
            </div>
          `}
        `;
      } 
      
      else if (activeTab === 'addresses') {
        const addrs = userData.addresses || [];
        content.innerHTML = `
          <h2 class="profile-title">Address Book</h2>
          <div class="address-grid" style="grid-template-columns: 1fr; gap: 1rem;">
            ${addrs.length === 0 ? `
              <p style="color: var(--text-muted);">No shipping addresses saved yet.</p>
            ` : addrs.map((addr, idx) => `
              <div class="address-card" style="cursor: default; display: flex; justify-content: space-between; align-items: start;">
                <div>
                  <div class="name">${addr.fullName} <span class="type-badge" style="margin-left: 0.5rem; margin-top: 0;">${addr.type}</span></div>
                  <div class="details">
                    ${addr.line1}${addr.line2 ? ', ' + addr.line2 : ''}<br>
                    ${addr.landmark ? 'Landmark: ' + addr.landmark + '<br>' : ''}
                    ${addr.city}, ${addr.state} - ${addr.pincode}<br>
                    Phone: ${addr.phone}
                  </div>
                </div>
                <button onclick="deleteAddress(${idx})" style="color: var(--error); font-weight: 600; font-size: 0.85rem;"><i class="fas fa-trash-alt"></i> Delete</button>
              </div>
            `).join('')}
          </div>

          <div style="margin-top: 3rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
            <h3 class="serif-title" style="font-size: 1.25rem; margin-bottom: 1.5rem;">Add Saved Address</h3>
            <form id="add-address-form" onsubmit="handleAddAddress(event)">
              <div class="form-grid" style="grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                <div class="form-group" style="grid-column: span 2;">
                  <label for="fullName">Recipient Full Name</label>
                  <input type="text" id="fullName" required placeholder="e.g. Sathwika D">
                </div>
                <div class="form-group">
                  <label for="phone">Contact Number</label>
                  <input type="text" id="phone" required placeholder="e.g. 9999988888">
                </div>
                <div class="form-group">
                  <label for="type">Address Type</label>
                  <select id="type" style="width: 100%; border: 1px solid var(--border-color); padding: 0.85rem; background-color: var(--bg-primary);">
                    <option value="Home">Home</option>
                    <option value="Work">Work</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                  <label for="line1">Address Line 1</label>
                  <input type="text" id="line1" required placeholder="e.g. Flat 404, Rose Villa">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                  <label for="line2">Address Line 2 (Optional)</label>
                  <input type="text" id="line2" placeholder="e.g. Marathahalli">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                  <label for="landmark">Landmark (Optional)</label>
                  <input type="text" id="landmark" placeholder="e.g. Behind Shell Bunk">
                </div>
                <div class="form-group">
                  <label for="city">City</label>
                  <input type="text" id="city" required placeholder="e.g. Bengaluru">
                </div>
                <div class="form-group">
                  <label for="state">State</label>
                  <input type="text" id="state" required placeholder="e.g. Karnataka">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                  <label for="pincode">Pincode</label>
                  <input type="text" id="pincode" required placeholder="e.g. 560037">
                </div>
              </div>
              <button type="submit" class="btn btn-primary" style="margin-top: 1.5rem; padding: 0.75rem 2rem; font-size: 0.85rem;">Add Address</button>
            </form>
          </div>
        `;
      }
    }

    window.handleProfileUpdate = async function(e) {
      e.preventDefault();
      const name = document.getElementById('updateName').value.trim();
      const phone = document.getElementById('updatePhone').value.trim();

      try {
        const response = await window.API.put('/auth/profile', { name, phone });
        if (response.success && response.data) {
          userData = response.data;
          window.API.showToast('Profile details updated successfully!');
          renderActiveTab();
        }
      } catch (err) {
        console.error('Failed to update profile:', err);
      }
    };

    window.handleAddAddress = async function(e) {
      e.preventDefault();
      const newAddr = {
        fullName: document.getElementById('fullName').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        line1: document.getElementById('line1').value.trim(),
        line2: document.getElementById('line2').value.trim(),
        landmark: document.getElementById('landmark').value.trim(),
        city: document.getElementById('city').value.trim(),
        state: document.getElementById('state').value.trim(),
        pincode: document.getElementById('pincode').value.trim(),
        type: document.getElementById('type').value
      };

      const updatedAddresses = [...(userData.addresses || []), newAddr];

      try {
        const response = await window.API.put('/auth/profile', { addresses: updatedAddresses });
        if (response.success && response.data) {
          userData = response.data;
          window.API.showToast('Address added to your account.');
          renderActiveTab();
        }
      } catch (err) {
        console.error('Failed to add address:', err);
      }
    };

    window.deleteAddress = async function(idx) {
      if (!confirm('Are you sure you want to delete this address?')) return;
      const updatedAddresses = userData.addresses.filter((_, i) => i !== idx);

      try {
        const response = await window.API.put('/auth/profile', { addresses: updatedAddresses });
        if (response.success && response.data) {
          userData = response.data;
          window.API.showToast('Address removed.');
          renderActiveTab();
        }
      } catch (err) {
        console.error('Failed to delete address:', err);
      }
    };

    window.removeWishlistItem = async function(productId) {
      try {
        const response = await window.API.delete(`/wishlist/${productId}`);
        if (response.success && response.data) {
          wishlistItems = response.data;
          window.API.showToast('Item removed from wishlist.');
          renderActiveTab();
        }
      } catch (err) {
        console.error('Failed to remove from wishlist:', err);
      }
    };
  </script>
</body>
</html>
